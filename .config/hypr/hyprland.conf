# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/windowrules.conf

################
### MONITORS ###
################
$monitor0 = HDMI-A-1
$monitor1 = DP-1

# See https://wiki.hypr.land/Configuring/Monitors/
monitor=$monitor0,2560x1440@360,0x0,1,bitdepth,10
monitor=$monitor1,2560x1440@360,2560x0,1,bitdepth,10
monitor = , preferred, auto, 1

###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$browser = google-chrome-stable
$audio_control = pavucontrol
$fileManager = yazi
$menu = rofi -show combi -modes combi -combi-modes "drun,run"
#$menu = rofi -show drun -modes "drun,run,keys" -sidebar-mode

#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = quickshell
exec-once = hypridle
exec-once = awww-daemon
exec-once = /etc/awww/awww_randomize.sh /usr/share/backgrounds/
exec-once = $browser --ozone-platform=wayland --ozone-platform-hint=auto
exec-once = systemctl --user start sunshine

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = GBM_BACKEND,nvidia-drm
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,gtk3
env = GTK_THEME,Adwaita:dark
env = EDITOR,nvim

###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(5e81accc)
    col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 10
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 8
        passes = 5

        vibrancy = 0.1696
        
        popups = true
        popups_ignorealpha = 0.1
    }
}

cursor { no_hardware_cursors = true }

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    # Default animations, see https://wiki.hypr.land/Configuring/Animations/
    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  almostLinear, fade
    animation = workspacesIn,  1,     1.21,  almostLinear, fade
    animation = workspacesOut, 1,     1.94,  almostLinear, fade
    animation = zoomFactor,    1,     7,     quick
}

# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
workspace = 1, monitor:$monitor0, default:true
workspace = 2, monitor:$monitor0
workspace = 3, monitor:$monitor1
workspace = 4, monitor:$monitor1

# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule {
#     name = no-gaps-wtv1
#     match:float = false
#     match:workspace = w[tv1]
#
#     border_size = 0
#     rounding = 0
# }
#
# windowrule {
#     name = no-gaps-f1
#     match:float = false
#     match:workspace = f[1]
#
#     border_size = 0
#     rounding = 0
# }

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
#   pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
}

#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 2
    numlock_by_default = true

	sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
	accel_profile = flat

	touchpad {
        natural_scroll = false
    }
}

# See https://wiki.hypr.land/Configuring/Gestures
# gesture = 3, horizontal, workspace

# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, T, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $terminal $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, O, layoutmsg, togglesplit # dwindle
bind = $mainMod, F, fullscreen, 0

# Application keybinds
bind = $mainMod, B, exec, $browser --ozone-platform=wayland --ozone-platform-hint=auto,
bind = $mainMod, A, exec, $audio_control
bind = $mainMod, D, exec, discord
bind = $mainMod, SPACE, exec, $menu
bind = $mainMod, G, exec, lutris

# Screenshot a window
bind = $mainMod, PRINT, exec, hyprshot -m window
# Screenshot a monitor
bind = , PRINT, exec, hyprshot -m output
# Screenshot a region
bind = $shiftMod, PRINT, exec, hyprshot -m region

# Move focus with mainMod
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d
bind = $mainMod, comma, focusmonitor, $monitor0
bind = $mainMod, period, focusmonitor, $monitor1

# Move active windows with mainMod
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4

# Move active window to the next monitor with mainMod + SHIFT + comma and period
bind = $mainMod SHIFT, comma, movewindow, mon:$monitor0
bind = $mainMod SHIFT, period, movewindow, mon:$monitor1

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4

# Standard special workspace (scratchpad). Can also be used to hide fullscreen games.
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic
bind = $mainMod SHIFT, S, togglespecialworkspace, magic

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Global Keybind for quickshell
bind = SUPER, S, global, quickshell:toggleBar
bind = SUPER, 1, global, quickshell:toggleBar
bind = SUPER, 2, global, quickshell:toggleBar
bind = SUPER, 3, global, quickshell:toggleBar
bind = SUPER, 4, global, quickshell:toggleBar
bind = SUPER, Tab, global, quickshell:togglePanel

# Disable DP-1 for Moonlight remote sessions
bind = SUPER, U, exec, hyprctl keyword monitor DP-1,disable

# Reload Hyprland config to restore dual monitors
bind = SUPER SHIFT, U, exec, hyprctl reload

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Global Mute Key
bindel = CTRL SHIFT, M, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Ignore maximize requests from apps. You'll probably like this.
windowrule {
  name = windowrule-1
  suppress_event = maximize
  match:class = .*
}


# Fix some dragging issues with XWayland
windowrule {
  name = windowrule-2
  no_focus = on
  match:class = ^$
  match:title = ^$
  match:xwayland = 1
  match:float = 1
  match:fullscreen = 0
  match:pin = 0
}


windowrule {
  name = windowrule-3
  tile = on
  match:class = ^(steam)$
}

windowrule {
  name = windowrule-4
  float = on
  match:class = ^(steam)$
  match:title = negative:^(Steam)$
}

windowrule { 
    name = windowrule-5 
    opacity = 0.80 
    match:class = ^(org.pulseaudio.pavucontrol)$ 
}

# 1. Float all Unity windows by default so tiny menus don't tile
windowrule {
    name = unity-float-all
    match:class = ^(Unity)$
    float = 1
}

# 2. Tile the main Unity Editor window (overrides the rule above)
windowrule {
    name = unity-tile-main
    match:class = ^(Unity)$
    match:title = ^(Unity - .*)$
    float = 0
}

# 3. Fix tiny/unclickable drop-down menus (like "Add Component")
windowrule {
    name = unity-dropdown-advanced
    match:initial_title = (UnityEditor.IMGUI.Controls.AdvancedDropdownWindow)
    min_size = 300 200
}

windowrule {
    name = unity-dropdown-add-component
    match:initial_title = (UnityEditor.AddComponent.AddComponentWindow)
    min_size = 230 200
}

windowrule {
    name = unity-dropdown-filter
    match:initial_title = (UnityEditor.Rendering.FilterWindow)
    min_size = 230 200
}

# 4. Prevent tooltips from stealing window focus
windowrule {
    name = unity-tooltip-focus
    match:class = ^(Unity)$
    match:title = ^(UnityTooltipWindow)$
    no_initial_focus = 1
}

# Float Unity windows that have no title (Drag proxies and hidden X11 payloads)
windowrule {
    name = unity-drag-proxy-empty
    match:class = ^(Unity)$
    match:title = ^$
    float = 1
    no_initial_focus = 1
    no_anim = 1
    min_size = 1 1
}

# Float windows titled exactly "Unity" 
windowrule {
    name = unity-drag-proxy-exact
    match:class = ^(Unity)$
    match:title = ^(Unity)$
    float = 1
    no_initial_focus = 1
    no_anim = 1
    min_size = 1 1
}

# Float compilation and loading progress bars
windowrule {
    name = unity-progress-bars
    match:class = ^(Unity)$
    match:title = ^(Compiling|Reloading|Hold on|Importing|Building).*$
    float = 1
    no_initial_focus = 1
    center = 1
}

layerrule = blur on, match:namespace rofi
layerrule = ignore_alpha 0.1, match:namespace rofi
layerrule = blur on, match:namespace quickshell
layerrule = blur_popups on, match:namespace quickshell
layerrule = ignore_alpha 0.1, match:namespace quickshell
layerrule = blur on, match:namespace chrome

debug {
  disable_logs = false
  enable_stdout_logs = false
}
